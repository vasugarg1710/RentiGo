<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Fleet Oversight - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased pt-20 bg-slate-950 text-white">
    <div id="header-placeholder"></div>
    <main class="py-8 min-h-screen dashboard-layout gap-8 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <aside class="w-full md:w-1/4 hidden md:block">
            <!-- Sidebar content -->
            <div class="glass-card rounded-3xl p-6 sticky top-28 border border-emerald-500/20 shadow-2xl">
                <div class="hidden md:flex flex-col items-center mb-8 border-b border-slate-700/50 pb-6">
                    <div class="w-20 h-20 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-full flex items-center justify-center text-3xl text-white font-black shadow-lg shadow-emerald-500/30 mb-4 border-4 border-slate-800"><i class="fa-solid fa-shield-halved"></i></div>
                    <h2 class="text-xl font-bold text-white text-center">System Admin</h2>
                    <p class="text-emerald-400 text-xs font-bold uppercase tracking-widest mt-1">Superuser</p>
                </div>
                <nav class="space-y-3">
                    <a href="admin-dashboard.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-chart-pie w-5 text-center"></i> Overview</a>
                    <a href="admin-users.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-users w-5 text-center"></i> User Management</a>
                    <a href="admin-agencies.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-building w-5 text-center"></i> Agencies</a>
                    <a href="admin-fleet.html" class="flex items-center gap-3 bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-3.5 rounded-xl font-bold transition-all shadow-lg hover:shadow-emerald-500/40 translate-x-1"><i class="fa-solid fa-car w-5 text-center"></i> Fleet Oversight</a>
                    <a href="admin-financials.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-coins w-5 text-center"></i> Financials</a>
                    <a href="admin-settings.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all border-t border-slate-700/50 mt-4 pt-4"><i class="fa-solid fa-gear w-5 text-center"></i> System Settings</a>
                </nav>
            </div>
        </aside>

        <div class="w-full md:w-3/4">
            <h1 class="text-3xl lg:text-4xl font-black text-white mb-8">System <span class="text-gradient">Fleet Directory</span></h1>
            
            <div class="glass-card rounded-3xl overflow-hidden border border-slate-700/50 shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left whitespace-nowrap min-w-[900px]">
                        <thead class="bg-slate-900/80 text-gray-400 text-xs uppercase tracking-widest font-bold">
                            <tr>
                                <th class="px-6 py-5">Vehicle Name</th>
                                <th class="px-6 py-5">Agency ID</th>
                                <th class="px-6 py-5">Type</th>
                                <th class="px-6 py-5">Pricing / Day</th>
                                <th class="px-6 py-5">Global Status</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800/80" id="global-fleet-list">
                            <!-- Populated By JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="js/mock-data.js"></script><script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const list = document.getElementById('global-fleet-list');
            mockVehicles.forEach((v, index) => {
                const statusHtml = v.available 
                    ? '<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Available</span>'
                    : '<span class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Rented Out</span>';
                
                list.innerHTML += \`
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="px-6 py-4 font-bold text-white">${v.brand} ${v.model}</td>
                        <td class="px-6 py-4 font-mono text-gray-400 text-sm">${v.agencyId}</td>
                        <td class="px-6 py-4 text-sm text-gray-300">${v.type}</td>
                        <td class="px-6 py-4 font-mono text-emerald-400 font-bold">$${v.price.daily}</td>
                        <td class="px-6 py-4">${statusHtml}</td>
                    </tr>
                `;
            });
        });
    </script>
</body>
</html>
