<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>User Management - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased pt-20 bg-slate-950 text-white">
    <div id="header-placeholder"></div>
    <main class="py-8 min-h-screen dashboard-layout gap-8 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <aside class="w-full md:w-1/4 hidden md:block">
            <div class="glass-card rounded-3xl p-6 sticky top-28 border border-emerald-500/20 shadow-2xl">
                <div class="hidden md:flex flex-col items-center mb-8 border-b border-slate-700/50 pb-6">
                    <div class="w-20 h-20 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-full flex items-center justify-center text-3xl text-white font-black shadow-lg shadow-emerald-500/30 mb-4 border-4 border-slate-800"><i class="fa-solid fa-shield-halved"></i></div>
                    <h2 class="text-xl font-bold text-white text-center">System Admin</h2>
                    <p class="text-emerald-400 text-xs font-bold uppercase tracking-widest mt-1">Superuser</p>
                </div>
                <nav class="space-y-3">
                    <a href="admin-dashboard.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-chart-pie w-5 text-center"></i> Overview</a>
                    <a href="admin-users.html" class="flex items-center gap-3 bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-3.5 rounded-xl font-bold transition-all shadow-lg hover:shadow-emerald-500/40 translate-x-1"><i class="fa-solid fa-users w-5 text-center"></i> User Management</a>
                    <a href="admin-agencies.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-building w-5 text-center"></i> Agencies</a>
                    <a href="admin-fleet.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-car w-5 text-center"></i> Fleet Oversight</a>
                    <a href="admin-financials.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-coins w-5 text-center"></i> Financials</a>
                    <a href="admin-settings.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all border-t border-slate-700/50 mt-4 pt-4"><i class="fa-solid fa-gear w-5 text-center"></i> System Settings</a>
                </nav>
            </div>
        </aside>

        <div class="w-full md:w-3/4">
            <h1 class="text-3xl lg:text-4xl font-black text-white mb-8">User <span class="text-gradient">Management</span></h1>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-between items-center bg-slate-800/30 p-4 rounded-2xl border border-slate-700/50 mb-6">
                <div class="relative w-full sm:w-96">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" placeholder="Search users by name, email or ID..." class="w-full bg-slate-900 border border-slate-700 focus:border-emerald-500 rounded-xl py-3 pl-12 pr-4 outline-none text-sm">
                </div>
                <button class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-3 rounded-xl text-sm font-bold transition-colors w-full sm:w-auto"><i class="fa-solid fa-download mr-2"></i> Export Data</button>
            </div>

            <div class="glass-card rounded-3xl overflow-hidden border border-slate-700/50 shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left whitespace-nowrap min-w-[800px]">
                        <thead class="bg-slate-900/80 text-gray-400 text-xs uppercase tracking-widest font-bold">
                            <tr>
                                <th class="px-6 py-5">User</th>
                                <th class="px-6 py-5">Role</th>
                                <th class="px-6 py-5">Status</th>
                                <th class="px-6 py-5">Joined</th>
                                <th class="px-6 py-5 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800/80">
                            <!-- Mock Data Row 1 -->
                            <tr class="hover:bg-slate-800/40 transition-colors">
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-3">
                                        <img src="https://ui-avatars.com/api/?name=Alex+Doe&background=4F46E5&color=fff" class="w-10 h-10 rounded-full">
                                        <div>
                                            <p class="font-bold text-white text-sm">Alex Doe</p>
                                            <p class="text-xs text-gray-500">alex@example.com</p>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-sm font-semibold text-indigo-400">Customer</td>
                                <td class="px-6 py-4"><span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Active</span></td>
                                <td class="px-6 py-4 text-sm text-gray-400">Mar 10, 2026</td>
                                <td class="px-6 py-4 text-right">
                                    <button class="text-gray-400 hover:text-white p-2" title="Edit"><i class="fa-solid fa-pen"></i></button>
                                    <button class="text-gray-400 hover:text-red-400 p-2" title="Ban"><i class="fa-solid fa-ban"></i></button>
                                </td>
                            </tr>
                            <!-- Mock Data Row 2 -->
                            <tr class="hover:bg-slate-800/40 transition-colors">
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-3">
                                        <img src="https://ui-avatars.com/api/?name=Sarah+Smith&background=10B981&color=fff" class="w-10 h-10 rounded-full">
                                        <div>
                                            <p class="font-bold text-white text-sm">Sarah Smith</p>
                                            <p class="text-xs text-gray-500">sarah@rentigo.com</p>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-sm font-semibold text-emerald-400">Admin</td>
                                <td class="px-6 py-4"><span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Active</span></td>
                                <td class="px-6 py-4 text-sm text-gray-400">Jan 15, 2025</td>
                                <td class="px-6 py-4 text-right">
                                    <button class="text-gray-400 hover:text-white p-2" title="Edit"><i class="fa-solid fa-pen"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="js/mock-data.js"></script><script src="js/main.js"></script>
</body>
</html>
