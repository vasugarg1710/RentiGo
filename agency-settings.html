<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Settings - Agency Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased pt-20 bg-slate-950 text-white">
    <div id="header-placeholder"></div>
    <main class="py-8 min-h-screen dashboard-layout gap-8 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <aside class="w-full md:w-1/4 hidden md:block">
            <div class="glass-card rounded-3xl p-6 sticky top-28 border border-indigo-500/20 shadow-2xl">
                <div class="hidden md:flex flex-col items-center mb-8 border-b border-slate-700/50 pb-6">
                    <div class="w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-3xl text-white font-black shadow-lg shadow-indigo-500/30 mb-4 rotate-3">ER</div>
                    <h2 class="text-xl font-bold text-white text-center">Elite Rentals Ltd.</h2>
                </div>
                <nav class="space-y-3">
                    <a href="agency-dashboard.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-car-side w-5 text-center"></i> My Fleet</a>
                    <a href="agency-bookings.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-calendar-check w-5 text-center"></i> Manage Bookings</a>
                    <a href="agency-analytics.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-chart-line w-5 text-center"></i> Revenue Analytics</a>
                    <a href="agency-reviews.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-star w-5 text-center"></i> Reviews</a>
                    <a href="agency-settings.html" class="flex items-center gap-3 bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-3.5 rounded-xl font-bold transition-all shadow-lg hover:shadow-indigo-500/40 translate-x-1 border-t border-slate-700/50 mt-4 pt-4"><i class="fa-solid fa-gear w-5 text-center"></i> Agency Settings</a>
                </nav>
            </div>
        </aside>

        <div class="w-full md:w-3/4">
            <h1 class="text-3xl lg:text-4xl font-black text-white mb-8">Agency <span class="text-gradient">Settings</span></h1>

            <div class="glass-card p-8 rounded-3xl border border-slate-700/50 mb-8">
                <h3 class="text-xl font-bold text-white mb-6 border-b border-slate-700/50 pb-4">Business Details</h3>
                <form class="space-y-6" onsubmit="alert('Settings Saved'); event.preventDefault();">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Business Name</label>
                            <input type="text" value="Elite Rentals Ltd." class="w-full bg-slate-900 border border-slate-700 focus:border-indigo-500 rounded-xl px-4 py-3 outline-none text-white transition-colors">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Support Email</label>
                            <input type="email" value="contact@eliterentals.com" class="w-full bg-slate-900 border border-slate-700 focus:border-indigo-500 rounded-xl px-4 py-3 outline-none text-white transition-colors">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Business Address</label>
                        <input type="text" value="789 Auto District, San Francisco CA" class="w-full bg-slate-900 border border-slate-700 focus:border-indigo-500 rounded-xl px-4 py-3 outline-none text-white transition-colors">
                    </div>
                    <div class="pt-4 flex justify-end">
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg hover:shadow-indigo-500/40">Save Details</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="js/mock-data.js"></script><script src="js/main.js"></script>
</body>
</html>
