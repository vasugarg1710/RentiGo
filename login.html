<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Login - RentiGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased flex flex-col items-center justify-center min-h-screen relative pt-20">
    <div id="header-placeholder" class="w-full absolute top-0"></div>
    <div class="absolute inset-0 bg-indigo-600/10 -z-10 blur-3xl rounded-full"></div>
    <div class="glass-card p-8 rounded-2xl w-full max-w-md shadow-2xl border border-indigo-500/20">
        <h2 class="text-3xl font-bold mb-2 text-center">Welcome Back</h2>
        <p class="text-center text-gray-400 mb-8">Log in to manage your rentals.</p>
        <form onsubmit="window.location.href='index.html'; return false;" class="space-y-5">
            <input type="email" placeholder="Email Address" required class="w-full bg-slate-800/80 p-3.5 rounded-xl text-white outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="password" placeholder="Password" required class="w-full bg-slate-800/80 p-3.5 rounded-xl text-white outline-none focus:ring-2 focus:ring-indigo-500">
            <div class="flex justify-between items-center text-sm">
                <label class="flex items-center text-gray-400"><input type="checkbox" class="mr-2 accent-indigo-500"> Remember me</label>
                <a href="#" class="text-indigo-400 hover:text-indigo-300">Forgot password?</a>
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white p-3.5 rounded-xl font-bold shadow-lg transition-all hover:shadow-[0_0_20px_rgba(79,70,229,0.5)]">Sign In</button>
            <p class="text-center text-gray-400 mt-6">Don't have an account? <a href="register.html" class="text-indigo-400 font-bold ml-1">Sign Up</a></p>
        </form>
    </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
