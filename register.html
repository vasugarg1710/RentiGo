<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Register - RentiGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased flex flex-col items-center justify-center min-h-screen relative pt-20">
    <div id="header-placeholder" class="w-full absolute top-0"></div>
    <div class="absolute inset-0 bg-purple-600/10 -z-10 blur-3xl rounded-full"></div>
    <div class="glass-card p-8 rounded-2xl w-full max-w-md shadow-2xl border border-purple-500/20">
        <h2 class="text-3xl font-bold mb-2 text-center">Join RentiGo</h2>
        <p class="text-center text-gray-400 mb-8">Create an account to start renting.</p>
        <form onsubmit="window.location.href='login.html'; return false;" class="space-y-4">
            <input type="text" placeholder="Full Name" required class="w-full bg-slate-800/80 p-3.5 rounded-xl text-white outline-none focus:ring-2 focus:ring-purple-500">
            <input type="email" placeholder="Email Address" required class="w-full bg-slate-800/80 p-3.5 rounded-xl text-white outline-none focus:ring-2 focus:ring-purple-500">
            <input type="password" placeholder="Password" required class="w-full bg-slate-800/80 p-3.5 rounded-xl text-white outline-none focus:ring-2 focus:ring-purple-500">
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 text-white p-3.5 rounded-xl font-bold shadow-lg transition-all hover:shadow-[0_0_20px_rgba(147,51,234,0.5)] mt-4">Create Account</button>
            <p class="text-center text-gray-400 mt-6">Already have an account? <a href="login.html" class="text-purple-400 font-bold ml-1">Log In</a></p>
        </form>
    </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
