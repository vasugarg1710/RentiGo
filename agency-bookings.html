<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Manage Bookings - Agency Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased pt-20 bg-slate-950 text-white">
    <div id="header-placeholder"></div>
    <main class="py-8 min-h-screen dashboard-layout gap-8 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Reusing Agency Sidebar Structure -->
        <aside class="w-full md:w-1/4 hidden md:block">
            <div class="glass-card rounded-3xl p-6 sticky top-28 border border-indigo-500/20 shadow-2xl">
                <div class="hidden md:flex flex-col items-center mb-8 border-b border-slate-700/50 pb-6">
                    <div class="w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-3xl text-white font-black shadow-lg shadow-indigo-500/30 mb-4 rotate-3">ER</div>
                    <h2 class="text-xl font-bold text-white text-center">Elite Rentals Ltd.</h2>
                </div>
                <nav class="space-y-3">
                    <a href="agency-dashboard.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-car-side w-5 text-center"></i> My Fleet</a>
                    <a href="agency-bookings.html" class="flex items-center gap-3 bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-3.5 rounded-xl font-bold transition-all shadow-lg hover:shadow-indigo-500/40 translate-x-1"><i class="fa-solid fa-calendar-check w-5 text-center"></i> Manage Bookings <span class="ml-auto bg-indigo-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">3</span></a>
                    <a href="agency-analytics.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-chart-line w-5 text-center"></i> Revenue Analytics</a>
                    <a href="agency-reviews.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-star w-5 text-center"></i> Reviews</a>
                    <a href="agency-settings.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all border-t border-slate-700/50 mt-4 pt-4"><i class="fa-solid fa-gear w-5 text-center"></i> Agency Settings</a>
                </nav>
            </div>
        </aside>

        <div class="w-full md:w-3/4">
            <h1 class="text-3xl lg:text-4xl font-black text-white mb-8">Manage <span class="text-gradient">Bookings</span></h1>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-between items-center bg-slate-800/30 p-4 rounded-2xl border border-slate-700/50 mb-6">
                <div class="relative w-full sm:w-96">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" placeholder="Search by Booking ID or Customer..." class="w-full bg-slate-900 border border-slate-700 focus:border-indigo-500 rounded-xl py-3 pl-12 pr-4 outline-none text-sm">
                </div>
                <div class="flex gap-2 shrink-0">
                    <select class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 outline-none text-sm appearance-none">
                        <option>All Statuses</option>
                        <option>Active</option>
                        <option>Pending</option>
                        <option>Completed</option>
                    </select>
                </div>
            </div>

            <div class="glass-card rounded-3xl overflow-hidden border border-slate-700/50 shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left whitespace-nowrap min-w-[900px]">
                        <thead class="bg-slate-900/80 text-gray-400 text-xs uppercase tracking-widest font-bold">
                            <tr>
                                <th class="px-6 py-5">Booking ID</th>
                                <th class="px-6 py-5">Customer</th>
                                <th class="px-6 py-5">Vehicle</th>
                                <th class="px-6 py-5">Dates</th>
                                <th class="px-6 py-5">Status</th>
                                <th class="px-6 py-5 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800/80" id="agency-bookings-list">
                            <!-- Populated By JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="js/mock-data.js"></script><script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const list = document.getElementById('agency-bookings-list');
            const agencyVehicles = mockVehicles.filter(v => v.agencyId === 'a1').map(v => v.id);
            const agencyBookings = mockBookings.filter(b => agencyVehicles.includes(b.vehicleId));

            agencyBookings.forEach((b, index) => {
                const v = mockVehicles.find(vh => vh.id === b.vehicleId);
                const delay = index * 100;
                
                const statusColor = b.status === 'Active' ? 'emerald' : b.status === 'Completed' ? 'gray' : 'orange';
                
                list.innerHTML += `
                    <tr class="hover:bg-slate-800/40 transition-colors animate-fade-in" style="animation-delay: ${delay}ms">
                        <td class="px-6 py-4">
                            <span class="font-mono text-indigo-400 font-bold">#${b.id.toUpperCase()}-${Math.floor(Math.random()*1000)}</span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-3">
                                <img src="${mockUser.avatar}" class="w-8 h-8 rounded-full">
                                <div>
                                    <p class="font-bold text-white text-sm">${mockUser.name}</p>
                                    <p class="text-xs text-gray-500">${mockUser.email}</p>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-sm font-semibold text-white">${v.brand} ${v.model}</td>
                        <td class="px-6 py-4">
                            <p class="text-sm text-gray-300 font-mono">${b.startDate}</p>
                            <p class="text-xs text-gray-500">to ${b.endDate}</p>
                        </td>
                        <td class="px-6 py-4">
                            <span class="bg-${statusColor}-500/10 text-${statusColor}-400 border border-${statusColor}-500/20 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">${b.status}</span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button class="bg-slate-800 hover:bg-slate-700 text-indigo-400 px-4 py-2 rounded-lg text-xs font-bold transition-colors">Details</button>
                        </td>
                    </tr>
                `;
            });
        });
    </script>
</body>
</html>
