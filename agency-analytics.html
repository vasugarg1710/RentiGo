<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Revenue Analytics - Agency Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="antialiased pt-20 bg-slate-950 text-white">
    <div id="header-placeholder"></div>
    <main class="py-8 min-h-screen dashboard-layout gap-8 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <aside class="w-full md:w-1/4 hidden md:block">
            <div class="glass-card rounded-3xl p-6 sticky top-28 border border-indigo-500/20 shadow-2xl">
                <div class="hidden md:flex flex-col items-center mb-8 border-b border-slate-700/50 pb-6">
                    <div class="w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-3xl text-white font-black shadow-lg shadow-indigo-500/30 mb-4 rotate-3">ER</div>
                    <h2 class="text-xl font-bold text-white text-center">Elite Rentals Ltd.</h2>
                </div>
                <nav class="space-y-3">
                    <a href="agency-dashboard.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-car-side w-5 text-center"></i> My Fleet</a>
                    <a href="agency-bookings.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-calendar-check w-5 text-center"></i> Manage Bookings</a>
                    <a href="agency-analytics.html" class="flex items-center gap-3 bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-3.5 rounded-xl font-bold transition-all shadow-lg hover:shadow-indigo-500/40 translate-x-1"><i class="fa-solid fa-chart-line w-5 text-center"></i> Revenue Analytics</a>
                    <a href="agency-reviews.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-star w-5 text-center"></i> Reviews</a>
                    <a href="agency-settings.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-5 py-3.5 rounded-xl transition-all border-t border-slate-700/50 mt-4 pt-4"><i class="fa-solid fa-gear w-5 text-center"></i> Agency Settings</a>
                </nav>
            </div>
        </aside>

        <div class="w-full md:w-3/4">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                <h1 class="text-3xl lg:text-4xl font-black text-white">Revenue <span class="text-gradient">Analytics</span></h1>
                <select class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 outline-none text-sm appearance-none min-w-[200px]">
                    <option>This Month (March 2026)</option>
                    <option>Last Month</option>
                    <option>Year to Date</option>
                </select>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass-card p-6 rounded-3xl border border-slate-700/50">
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2">Total Earnings</p>
                    <h2 class="text-4xl font-black text-emerald-400 font-mono">$12,450</h2>
                    <p class="text-sm text-green-500 mt-2"><i class="fa-solid fa-arrow-trend-up"></i> +14% from last month</p>
                </div>
                <div class="glass-card p-6 rounded-3xl border border-slate-700/50">
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2">Total Bookings</p>
                    <h2 class="text-4xl font-black text-white font-mono">48</h2>
                    <p class="text-sm text-green-500 mt-2"><i class="fa-solid fa-arrow-trend-up"></i> +5% from last month</p>
                </div>
                <div class="glass-card p-6 rounded-3xl border border-slate-700/50">
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2">Fleet Utilization</p>
                    <h2 class="text-4xl font-black text-white font-mono">85%</h2>
                    <div class="w-full bg-slate-800 rounded-full h-2 mt-4">
                        <div class="bg-indigo-500 h-2 rounded-full" style="width: 85%"></div>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-3xl p-6 border border-slate-700/50 mb-8">
                <h3 class="text-xl font-bold mb-6">Earnings Breakdown</h3>
                <div class="h-80 w-full relative">
                    <canvas id="detailedRevenueChart"></canvas>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="js/mock-data.js"></script><script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ctx = document.getElementById('detailedRevenueChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                    datasets: [
                        {
                            label: '4-Wheelers ($)',
                            data: [1200, 1900, 1500, 2200],
                            backgroundColor: 'rgba(79, 70, 229, 0.8)',
                            borderRadius: 4
                        },
                        {
                            label: '2-Wheelers ($)',
                            data: [400, 600, 550, 800],
                            backgroundColor: 'rgba(168, 85, 247, 0.8)',
                            borderRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { stacked: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                        x: { stacked: true, grid: { display: false }, ticks: { color: '#64748b' } }
                    },
                    plugins: { legend: { labels: { color: '#fff' } } }
                }
            });
        });
    </script>
</body>
</html>
