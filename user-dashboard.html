<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>My Dashboard - RentiGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased pt-20 bg-slate-950">
    <div id="header-placeholder"></div>
    
    <main class="py-8 min-h-screen">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 dashboard-layout gap-8">
            
            <!-- Mobile Sidebar Toggle -->
            <div class="md:hidden flex justify-between items-center mb-4 glass-card p-4 rounded-xl">
                <span class="font-bold text-white">Dashboard Menu</span>
                <button onclick="document.getElementById('user-sidebar').classList.toggle('hidden')" class="text-indigo-400 focus:outline-none">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
            </div>

            <!-- Sidebar -->
            <aside id="user-sidebar" class="w-full md:w-1/4 hidden md:block">
                <div class="glass-card rounded-3xl p-6 sticky top-28 border border-indigo-500/20 shadow-2xl">
                    <div class="text-center border-b border-slate-700/50 pb-6 mb-6">
                        <img id="user-avatar" src="https://ui-avatars.com/api/?name=Alex+Doe&background=4F46E5&color=fff&size=128" alt="Profile" class="w-24 h-24 rounded-full mx-auto border-4 border-indigo-500/30 shadow-lg mb-4">
                        <h2 class="text-xl font-bold text-white" id="user-name">Loading...</h2>
                        <p class="text-indigo-400 text-sm font-medium mt-1">Premium Member</p>
                    </div>
                    <nav class="space-y-2">
                        <a href="user-dashboard.html" class="flex items-center gap-3 bg-indigo-600/20 text-indigo-300 px-4 py-3.5 rounded-xl font-bold transition-all border border-indigo-500/30 shadow-[0_0_15px_rgba(79,70,229,0.1)]"><i class="fa-solid fa-calendar-check w-5 text-center"></i> My Bookings</a>
                        <a href="user-saved.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-4 py-3.5 rounded-xl transition-all"><i class="fa-regular fa-heart w-5 text-center"></i> Saved Vehicles</a>
                        <a href="user-payments.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-4 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-wallet w-5 text-center"></i> Payment Methods</a>
                        <a href="user-profile.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-4 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-gear w-5 text-center"></i> Profile Settings</a>
                        <a href="login.html" class="flex items-center gap-3 hover:bg-red-500/10 text-gray-400 hover:text-red-400 px-4 py-3.5 rounded-xl transition-all mt-8"><i class="fa-solid fa-arrow-right-from-bracket w-5 text-center"></i> Log Out</a>
                    </nav>
                </div>
            </aside>
            
            <!-- Main Content -->
            <div class="w-full md:w-3/4">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                    <div>
                        <h1 class="text-3xl lg:text-4xl font-black text-white">My <span class="text-gradient">Bookings</span></h1>
                        <p class="text-gray-400 mt-2">Manage your active and past rentals.</p>
                    </div>
                    <a href="vehicles.html" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:shadow-indigo-500/40 transition-all flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> New Booking
                    </a>
                </div>

                <!-- Stats Overview -->
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
                    <div class="glass-card p-5 rounded-2xl border-t-2 border-indigo-500">
                        <div class="flex items-center justify-between">
                            <p class="text-gray-400 text-sm font-semibold uppercase tracking-wider">Active</p>
                            <i class="fa-solid fa-car text-indigo-400"></i>
                        </div>
                        <p class="text-3xl font-black text-white mt-2 font-mono" id="active-count">0</p>
                    </div>
                    <div class="glass-card p-5 rounded-2xl border-t-2 border-purple-500">
                        <div class="flex items-center justify-between">
                            <p class="text-gray-400 text-sm font-semibold uppercase tracking-wider">Completed</p>
                            <i class="fa-solid fa-check-circle text-purple-400"></i>
                        </div>
                        <p class="text-3xl font-black text-white mt-2 font-mono" id="completed-count">0</p>
                    </div>
                    <div class="glass-card p-5 rounded-2xl border-t-2 border-emerald-500 col-span-2 md:col-span-1 hidden md:block">
                        <div class="flex items-center justify-between">
                            <p class="text-gray-400 text-sm font-semibold uppercase tracking-wider">Total Spent</p>
                            <i class="fa-solid fa-dollar-sign text-emerald-400"></i>
                        </div>
                        <p class="text-3xl font-black text-white mt-2 font-mono truncate" id="total-spent">$0</p>
                    </div>
                </div>

                <!-- Filters -->
                <div class="flex gap-2 mb-6 overflow-x-auto pb-2 scrollbar-none">
                    <button class="bg-indigo-600/20 text-indigo-300 border border-indigo-500/30 px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap">All Bookings</button>
                    <button class="bg-slate-800/50 hover:bg-slate-800 text-gray-400 px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap border border-slate-700/50 transition-colors">Active</button>
                    <button class="bg-slate-800/50 hover:bg-slate-800 text-gray-400 px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap border border-slate-700/50 transition-colors">Completed</button>
                    <button class="bg-slate-800/50 hover:bg-slate-800 text-gray-400 px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap border border-slate-700/50 transition-colors">Cancelled</button>
                </div>

                <div id="bookings-list" class="space-y-6">
                    <!-- Injected via JS -->
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/mock-data.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => { 
            setTimeout(() => {
                document.getElementById('user-name').textContent = mockUser.name;
                document.getElementById('user-avatar').src = mockUser.avatar;
                renderBookings();
            }, 100); 
        });

        function renderBookings() {
            const list = document.getElementById('bookings-list');
            const userBookings = mockBookings.filter(b => b.userId === 'u1');
            
            let active = 0;
            let completed = 0;
            let spent = 0;

            userBookings.forEach((b, index) => {
                if(b.status === 'Active') active++;
                if(b.status === 'Completed') completed++;
                spent += b.totalAmount;

                const v = mockVehicles.find(vh => vh.id === b.vehicleId);
                const delay = index * 100;
                
                const statusColor = b.status === 'Active' ? 'emerald' : b.status === 'Completed' ? 'gray' : 'red';
                const statusBadge = `<span class="bg-${statusColor}-500/10 text-${statusColor}-400 border border-${statusColor}-500/20 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">${b.status}</span>`;

                list.innerHTML += `
                    <div class="glass-card p-6 md:p-8 rounded-3xl flex flex-col md:flex-row items-start md:items-center gap-6 md:gap-8 border border-slate-700/50 animate-fade-in group relative overflow-hidden" style="animation-delay: ${delay}ms">
                        ${b.status === 'Active' ? '<div class="absolute top-0 left-0 w-1 h-full bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.8)]"></div>' : ''}
                        
                        <div class="w-full md:w-48 h-48 md:h-32 rounded-2xl overflow-hidden shrink-0 relative shadow-lg">
                            <img src="${v.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                            <div class="absolute top-2 right-2 md:hidden">${statusBadge}</div>
                        </div>
                        
                        <div class="flex-1 w-full">
                            <div class="flex justify-between items-start mb-2 hidden md:flex">
                                <h3 class="text-2xl font-bold text-white group-hover:text-indigo-400 transition-colors">${v.brand} ${v.model}</h3>
                                ${statusBadge}
                            </div>
                            
                            <h3 class="text-2xl font-bold text-white md:hidden mb-4">${v.brand} ${v.model}</h3>
                            
                            <div class="grid grid-cols-2 gap-y-3 gap-x-6 text-sm">
                                <div>
                                    <p class="text-gray-500 uppercase tracking-widest text-[10px] font-bold mb-1">Pick-up Date</p>
                                    <p class="text-gray-300 font-medium flex items-center gap-2"><i class="fa-regular fa-calendar text-indigo-400"></i> ${b.startDate}</p>
                                </div>
                                <div>
                                    <p class="text-gray-500 uppercase tracking-widest text-[10px] font-bold mb-1">Return Date</p>
                                    <p class="text-gray-300 font-medium flex items-center gap-2"><i class="fa-regular fa-calendar-check text-purple-400"></i> ${b.endDate}</p>
                                </div>
                                <div>
                                    <p class="text-gray-500 uppercase tracking-widest text-[10px] font-bold mb-1">Booking ID</p>
                                    <p class="text-gray-400 font-mono">#${b.id.toUpperCase()}-${Math.floor(Math.random()*1000)}</p>
                                </div>
                                <div>
                                    <p class="text-gray-500 uppercase tracking-widest text-[10px] font-bold mb-1">Total Paid</p>
                                    <p class="text-indigo-400 font-bold font-mono text-lg">$${b.totalAmount}</p>
                                </div>
                            </div>

                            ${b.status === 'Active' ? `
                            <div class="mt-6 flex flex-wrap gap-3 pt-6 border-t border-slate-700/50">
                                <button class="bg-indigo-600/20 hover:bg-indigo-600 text-indigo-300 hover:text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-colors flex-1 sm:flex-none text-center border border-indigo-500/30 hover:border-transparent">Extend Rental</button>
                                <button class="bg-slate-800 hover:bg-slate-700 text-gray-300 hover:text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-colors flex-1 sm:flex-none text-center border border-slate-700">Contact Support</button>
                            </div>
                            ` : `
                            <div class="mt-6 pt-6 border-t border-slate-700/50">
                                <button class="text-indigo-400 hover:text-indigo-300 text-sm font-bold flex items-center gap-2 transition-colors group-hover:translate-x-1 duration-300"><i class="fa-solid fa-rotate-right"></i> Book Again</button>
                            </div>
                            `}
                        </div>
                    </div>
                `;
            });

            document.getElementById('active-count').textContent = active;
            document.getElementById('completed-count').textContent = completed;
            document.getElementById('total-spent').textContent = '$' + spent;
        }
    </script>
</body>
</html>
