<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Profile Settings - RentiGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased pt-20 bg-slate-950">
    <div id="header-placeholder"></div>
    <main class="py-8 min-h-screen max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 dashboard-layout gap-8">
        
        <aside class="w-full md:w-1/4 hidden md:block">
            <div class="glass-card rounded-3xl p-6 sticky top-28 border border-slate-700/50 shadow-2xl">
                <div class="text-center border-b border-slate-700/50 pb-6 mb-6">
                    <img src="https://ui-avatars.com/api/?name=Alex+Doe&background=4F46E5&color=fff&size=128" class="w-24 h-24 rounded-full mx-auto border-4 border-indigo-500/30 shadow-lg mb-4">
                    <h2 class="text-xl font-bold text-white">Alex Doe</h2>
                </div>
                <nav class="space-y-2">
                    <a href="user-dashboard.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-4 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-calendar-check w-5 text-center"></i> My Bookings</a>
                    <a href="user-saved.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-4 py-3.5 rounded-xl transition-all"><i class="fa-regular fa-heart w-5 text-center"></i> Saved Vehicles</a>
                    <a href="user-payments.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-4 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-wallet w-5 text-center"></i> Payment Methods</a>
                    <a href="user-profile.html" class="flex items-center gap-3 bg-indigo-600/20 text-indigo-300 px-4 py-3.5 rounded-xl font-bold transition-all border border-indigo-500/30 shadow-[0_0_15px_rgba(79,70,229,0.1)]"><i class="fa-solid fa-gear w-5 text-center"></i> Profile Settings</a>
                </nav>
            </div>
        </aside>

        <div class="w-full md:w-3/4">
            <h1 class="text-3xl lg:text-4xl font-black text-white mb-8">Profile <span class="text-gradient">Settings</span></h1>
            
            <div class="glass-card p-8 rounded-3xl border border-slate-700/50 mb-8">
                <h3 class="text-xl font-bold text-white mb-6 border-b border-slate-700/50 pb-4">Personal Information</h3>
                <form class="space-y-6" onsubmit="alert('Profile Updated Successfully'); event.preventDefault();">
                    <div class="flex items-center gap-6 mb-8">
                        <img src="https://ui-avatars.com/api/?name=Alex+Doe&background=4F46E5&color=fff&size=128" class="w-20 h-20 rounded-full border-2 border-indigo-500">
                        <button type="button" class="bg-slate-800 border border-slate-700 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-700 transition">Change Avatar</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Full Name</label>
                            <input type="text" value="Alex Doe" class="w-full bg-slate-900 border border-slate-700 focus:border-indigo-500 rounded-xl px-4 py-3 outline-none text-white transition-colors">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Email</label>
                            <input type="email" value="alex@example.com" class="w-full bg-slate-900 border border-slate-700 focus:border-indigo-500 rounded-xl px-4 py-3 outline-none text-white transition-colors">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Phone Number</label>
                            <input type="text" value="+1 (555) 123-4567" class="w-full bg-slate-900 border border-slate-700 focus:border-indigo-500 rounded-xl px-4 py-3 outline-none text-white transition-colors">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Driver's License (ID)</label>
                            <div class="relative">
                                <input type="text" value="DL-987654321" disabled class="w-full bg-slate-900/50 text-gray-500 border border-slate-800 rounded-xl px-4 py-3 outline-none cursor-not-allowed">
                                <i class="fa-solid fa-check-circle absolute right-4 top-1/2 -translate-y-1/2 text-green-500" title="Verified"></i>
                            </div>
                        </div>
                    </div>
                    <div class="pt-4 flex justify-end">
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg hover:shadow-indigo-500/40">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="js/mock-data.js"></script><script src="js/main.js"></script>
</body>
</html>
