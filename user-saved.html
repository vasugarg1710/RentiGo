<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Saved Vehicles - RentiGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased pt-20 bg-slate-950">
    <div id="header-placeholder"></div>
    <main class="py-8 min-h-screen max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 dashboard-layout gap-8">
        
        <!-- Reusing User Sidebar Structure -->
        <aside class="w-full md:w-1/4 hidden md:block">
            <div class="glass-card rounded-3xl p-6 sticky top-28 border border-slate-700/50 shadow-2xl">
                <div class="text-center border-b border-slate-700/50 pb-6 mb-6">
                    <img src="https://ui-avatars.com/api/?name=Alex+Doe&background=4F46E5&color=fff&size=128" class="w-24 h-24 rounded-full mx-auto border-4 border-indigo-500/30 shadow-lg mb-4">
                    <h2 class="text-xl font-bold text-white">Alex Doe</h2>
                </div>
                <nav class="space-y-2">
                    <a href="user-dashboard.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-4 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-calendar-check w-5 text-center"></i> My Bookings</a>
                    <a href="user-saved.html" class="flex items-center gap-3 bg-indigo-600/20 text-indigo-300 px-4 py-3.5 rounded-xl font-bold transition-all border border-indigo-500/30 shadow-[0_0_15px_rgba(79,70,229,0.1)]"><i class="fa-solid fa-heart w-5 text-center"></i> Saved Vehicles</a>
                    <a href="user-payments.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-4 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-wallet w-5 text-center"></i> Payment Methods</a>
                    <a href="user-profile.html" class="flex items-center gap-3 hover:bg-slate-800/80 text-gray-400 hover:text-white px-4 py-3.5 rounded-xl transition-all"><i class="fa-solid fa-gear w-5 text-center"></i> Profile Settings</a>
                </nav>
            </div>
        </aside>

        <div class="w-full md:w-3/4">
            <h1 class="text-3xl lg:text-4xl font-black text-white mb-2">Saved <span class="text-gradient">Vehicles</span></h1>
            <p class="text-gray-400 mb-8">Your favorite rides, saved for quick booking later.</p>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6" id="saved-grid">
                <!-- Data populated by JS, reusing mockVehicles -->
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="js/mock-data.js"></script><script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('saved-grid');
            // Mock grabbing two vehicles as "saved"
            const saved = [mockVehicles[2], mockVehicles[4]]; 
            
            saved.forEach(vehicle => {
                grid.innerHTML += \`
                    <div class="glass-card rounded-3xl overflow-hidden group flex flex-col border border-slate-700/50 relative">
                        <button class="absolute top-4 right-4 z-20 w-10 h-10 bg-slate-900/50 backdrop-blur-md rounded-full flex items-center justify-center text-red-500 hover:bg-slate-900 transition-colors">
                            <i class="fa-solid fa-heart"></i>
                        </button>
                        <div class="relative h-48 overflow-hidden cursor-pointer shrink-0" onclick="window.location.href='vehicle-details.html?id=\${vehicle.id}'">
                            <img src="\${vehicle.image}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <h3 class="text-xl font-bold text-white mb-2">\${vehicle.brand} \${vehicle.model}</h3>
                            <div class="flex items-center text-sm text-gray-400 mb-4">
                                <i class="fa-solid fa-star text-yellow-400 mr-1"></i> \${vehicle.rating}
                            </div>
                            <div class="flex items-end justify-between mt-auto pt-4 border-t border-slate-700/50">
                                <div>
                                    <span class="text-2xl font-black text-white font-mono">$\${vehicle.price.daily}</span>
                                    <span class="text-gray-500 text-xs font-semibold">/day</span>
                                </div>
                                <a href="vehicle-details.html?id=\${vehicle.id}" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl font-bold transition-all text-sm">Book</a>
                            </div>
                        </div>
                    </div>
                \`;
            });
        });
    </script>
</body>
</html>
